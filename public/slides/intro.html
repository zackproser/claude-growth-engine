    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #FAF7F2;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .slide {
      max-width: 1200px;
      width: 100%;
      padding: 60px 80px;
      display: flex;
      align-items: center;
      gap: 80px;
    }
    .avatar {
      flex-shrink: 0;
    }
    .avatar img {
      width: 360px;
      height: 360px;
      border-radius: 24px;
      object-fit: cover;
      border: 3px solid #e8e0d4;
      image-rendering: auto;
    }
    .content {
      flex: 1;
    }
    .name {
      font-size: 48px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }
    .role {
      font-size: 20px;
      color: #D97757;
      font-weight: 500;
      margin-bottom: 40px;
    }
    .bullets {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .bullets li {
      font-size: 22px;
      color: #4a4a4a;
      padding-left: 28px;
      position: relative;
      line-height: 1.5;
    }
    .bullets li::before {
      content: '';
      position: absolute;
      left: 0;
      top: 12px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #D97757;
    }
    .bullets li strong {
      color: #1a1a1a;
    }
    .footer {
      position: fixed;
      bottom: 30px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 14px;
      color: #999;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .footer svg {
      width: 18px;
      height: 18px;
    }
  </style>
</head>

      <p class="role">Staff Developer &amp; AI Engineer</p>
      <ul class="bullets">

        <li>Built at <strong>startups of every size</strong> — from pre-seed to public company</li>
        <li>Building with <strong>Claude for 3 years</strong> — from the API to the Agent SDK</li>
